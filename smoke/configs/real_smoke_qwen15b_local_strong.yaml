seed: 42
output_dir: outputs/real_smoke_qwen15b_local_strong

model:
  name: Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: false
  local_files_only: true
  low_cpu_mem_usage: true
  torch_dtype: float16
  use_4bit: false

data:
  local_files_only: true

lora:
  rank: 32
  alpha: 64
  dropout: 0.0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

train:
  max_seq_len: 256
  learning_rate: 5.0e-4
  epochs: 3
  batch_size: 1
  grad_accum_steps: 4
  max_grad_norm: 1.0
  max_train_samples: 500
  max_eval_samples: 300

tasks:
  - name: gsm8k_vs_winograd
    task_a:
      dataset: gsm8k
      subset: main
      train_split: train
      eval_split: test
      input_key: question
      target_key: answer
    task_b:
      dataset: winogrande
      subset: winogrande_s
      train_split: train
      eval_split: validation
      input_key: sentence
      target_key: answer

  - name: gsm8k_vs_imdb
    task_a:
      dataset: gsm8k
      subset: main
      train_split: train
      eval_split: test
      input_key: question
      target_key: answer
    task_b:
      dataset: imdb
      train_split: train
      eval_split: test
      input_key: text
      target_key: label

metrics:
  compute_gradient_alignment: true
  compute_fisher_overlap: true
  compute_activation_spectrum_overlap: true
  c_couple_weights:
    gradient_alignment: 0.4
    fisher_overlap: 0.3
    activation_spectrum_overlap: 0.3

strategies:
  - vanilla_lora
  - random_freeze_30
  - lower_layers_freeze_30
  - c_couple_freeze_30
