seed: 42
output_dir: outputs/real_smoke_qwen15b_reverse8pairs_7b_protocol

model:
  name: Qwen/Qwen2.5-1.5B-Instruct
  local_path: /root/autodl-tmp/modelscope/Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: false
  local_files_only: true
  use_fast_tokenizer: false
  low_cpu_mem_usage: true
  torch_dtype: float16
  use_4bit: false

data:
  local_files_only: true
  hf_datasets_cache: /root/autodl-tmp/hf/datasets
  allow_fallback: false

lora:
  rank: 8
  alpha: 16
  dropout: 0.0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

train:
  max_seq_len: 192
  learning_rate: 5.0e-4
  epochs: 1
  batch_size: 1
  grad_accum_steps: 8
  max_grad_norm: 1.0
  max_train_samples: 80
  max_eval_samples: 80

tasks:
  - name: winograd_vs_gsm8k
    task_a: {dataset: winogrande, subset: winogrande_s, train_split: train, eval_split: validation, input_key: sentence, target_key: answer}
    task_b: {dataset: gsm8k, subset: main, train_split: train, eval_split: test, input_key: question, target_key: answer}

  - name: imdb_vs_gsm8k
    task_a: {dataset: imdb, train_split: train, eval_split: test, input_key: text, target_key: label}
    task_b: {dataset: gsm8k, subset: main, train_split: train, eval_split: test, input_key: question, target_key: answer}

  - name: hotpotqa_vs_gsm8k
    task_a: {dataset: hotpotqa/hotpot_qa, subset: distractor, train_split: train, eval_split: validation, input_key: question, target_key: answer}
    task_b: {dataset: gsm8k, subset: main, train_split: train, eval_split: test, input_key: question, target_key: answer}

  - name: twowiki_vs_gsm8k
    task_a: {dataset: ohjoonhee/2WikiMultihopQA, train_split: train, eval_split: validation, input_key: question, target_key: answer}
    task_b: {dataset: gsm8k, subset: main, train_split: train, eval_split: test, input_key: question, target_key: answer}

  - name: imdb_vs_mmlu
    task_a: {dataset: imdb, train_split: train, eval_split: test, input_key: text, target_key: label}
    task_b: {dataset: cais/mmlu, subset: high_school_physics, train_split: dev, eval_split: test, input_key: question, target_key: answer}

  - name: winograd_vs_mmlu
    task_a: {dataset: winogrande, subset: winogrande_s, train_split: train, eval_split: validation, input_key: sentence, target_key: answer}
    task_b: {dataset: cais/mmlu, subset: high_school_physics, train_split: dev, eval_split: test, input_key: question, target_key: answer}

  - name: imdb_vs_hotpotqa
    task_a: {dataset: imdb, train_split: train, eval_split: test, input_key: text, target_key: label}
    task_b: {dataset: hotpotqa/hotpot_qa, subset: distractor, train_split: train, eval_split: validation, input_key: question, target_key: answer}

  - name: winograd_vs_twowiki
    task_a: {dataset: winogrande, subset: winogrande_s, train_split: train, eval_split: validation, input_key: sentence, target_key: answer}
    task_b: {dataset: ohjoonhee/2WikiMultihopQA, train_split: train, eval_split: validation, input_key: question, target_key: answer}

metrics:
  compute_gradient_alignment: true
  compute_fisher_overlap: true
  compute_activation_spectrum_overlap: true
  c_couple_weights:
    gradient_alignment: 0.4
    fisher_overlap: 0.3
    activation_spectrum_overlap: 0.3

strategies:
  - vanilla_lora
  - random_freeze_30
  - lower_layers_freeze_30
  - c_couple_freeze_30
  - spectrum_freeze_30
